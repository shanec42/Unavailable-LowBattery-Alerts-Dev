# Unavailable & Low Battery Alerts — HA Package Helpers
#
# Copy this file into your Home Assistant packages/ directory.
# Ensure your configuration.yaml includes:
#
#   homeassistant:
#     packages: !include_dir_named packages/
#
# Then restart Home Assistant to create the helpers.
#
# NOTE: ignore_patterns, ignore_uuids, and battery_thresholds_override are stored
# in custom_components/device_alerts/config.json rather than input_text helpers.
# Use the Lovelace dashboard or Developer Tools → Services to manage them.

input_number:
  device_alerts_battery_threshold:
    name: "Battery Alert Threshold (global)"
    initial: 20
    min: 5
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-alert

input_text:
  device_alerts_pattern_input:
    name: "Device Alerts: Pattern Entry Field"
    # Temporary text field used by the Lovelace dashboard to enter a new ignore pattern.
    # Type a glob pattern here, then click "Add Pattern" to save it.
    # Example: *plex*    or    sensor.my_device_*
    initial: ""
    max: 255
    icon: mdi:regex

  device_alerts_notify_mobile_services:
    name: "Notifications: Mobile App Services"
    # Comma-separated notify service names.
    # Example: mobile_app_my_phone, mobile_app_partners_phone
    initial: ""
    max: 255
    icon: mdi:cellphone-message

  device_alerts_notify_gate_entity:
    name: "Notifications: Gate Entity"
    # Entity that must be 'on' before notifications are sent.
    # Leave blank to always notify regardless of state.
    # Example: input_boolean.im_home
    initial: ""
    max: 255
    icon: mdi:bell-lock

  device_alerts_smtp_service:
    name: "Notifications: SMTP Service Name"
    # The notify service name for email notifications.
    # Leave blank to skip email notifications entirely.
    # Example: smtp
    initial: ""
    max: 64
    icon: mdi:email-outline

  device_alerts_smtp_targets:
    name: "Notifications: SMTP Target Addresses"
    # Comma-separated email or SMS gateway addresses.
    # Only used when the SMTP service name above is set.
    initial: ""
    max: 255
    icon: mdi:email-multiple-outline

input_select:
  device_alerts_snooze_target:
    name: "Snooze Target"
    # Populated automatically by the integration — do not edit manually.
    options:
      - "(none)"
    icon: mdi:target

input_datetime:
  device_alerts_snooze_until:
    name: "Snooze Until"
    has_date: true
    has_time: true
    icon: mdi:calendar-clock
